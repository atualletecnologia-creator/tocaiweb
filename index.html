<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0">

<title>Tocai</title>

<link rel="stylesheet"
href="style.css?v=10">

</head>

<body>

<header>

  <h1>Tocai</h1>

  <p>
    Facilitando a vida do Instrumentista
  </p>

</header>

<main>

  <button class="secondary"
  onclick="toggleCultoList()">

    Lista de Culto

  </button>

  <section id="cultoPanel"
  class="hidden panel">

    <h2>
      Lista de Culto
    </h2>

    <button onclick="openCultoPlayer()">
      Abrir Lista
    </button>

    <div id="cultoList"></div>

  </section>

  <button class="secondary"
  onclick="toggleUploadPanel()">

    Enviar partitura

  </button>

  <section id="uploadPanel"
  class="hidden panel">

    <h2>
      Enviar partitura
    </h2>

    <input
      type="file"
      id="uploadFile"
      accept="application/pdf"
    >

    <button onclick="uploadPDF()">
      Enviar PDF para este instrumento
    </button>

    <p id="uploadStatus"></p>

  </section>

  <select id="instrumentSelect">

    <option value="1rzBliOlp0dZ5pJxqhG-c3SgJaQE7OdS7">
      Bateria
    </option>

    <option value="1N71fnDx_W30RFT-lQs3RNKoMcjmE61Y_">
      Baixo
    </option>

    <option value="1jwo1MhjGV7rnA8U-7tlb1wyA3eHo4tBG">
      Basson
    </option>

    <option value="13VCpSJAEqEOw5i5OGhXFceLFBVpsziYF">
      Clarinete
    </option>

    <option value="1ZY0Wp8uhFEKawQZ30Kezql9MN9ceLavz">
      Cordas
    </option>

    <option value="1XyxqpM9rfdMpNwcnh7LH04ISrHC-vkB2">
      Fagote
    </option>

    <option value="1U7VU0Xmhmk0F2tuoZMNZRmJ0K5uxb-vg">
      Flauta
    </option>

    <option value="1Sn9F7uUqCzi3RAtcQloakhYv9OoiV0an">
      Flugel
    </option>

    <option value="1Glc2uShEsHPElWHRHuRnG15hci542USp">
      Horn
    </option>

    <option value="1qjgqnO0-3KQZLdiISywGIUMZVyYtHjEV">
      Oboé
    </option>

    <option value="1N7iV-hi5XnZmgYXZExx3Bw-dqjWX_Qji">
      Saxofone
    </option>

    <option value="1-W7n5LrIZwXyfA8UaKDnegIkl2AyZOXb">
      Trombone
    </option>

    <option value="1Ovadf_hZuBiRU2z1j_l8213YOIL3pDgd">
      Trompa
    </option>

    <option value="1r5ptZPob16SjwmUY8sf6OLLAeul8szIc">
      Trompete
    </option>

    <option value="1WglM_Y4iG_EvcKfyWf1tNCBiWYwF9ErW">
      Viola
    </option>

    <option value="1lXlFlQcF7QjWT6X2tZDSTL-AdeWcJ1x6">
      Violino
    </option>

    <option value="1-8VhVQH46CNg2VmO1tNbDFJfos1QDNFN">
      Violoncelo
    </option>

    <option value="1MOrKKM1RKnyUHJIbpTnDvRuJJwTUMS3p">
      Voz e Piano
    </option>

  </select>

  <input
    type="text"
    id="searchInput"
    placeholder="Buscar partitura..."
  >

  <button onclick="searchPDFs()">
    Buscar
  </button>

  <div id="results"></div>

</main>

<footer>

  © 2026 Atualle Tecnologia.
  Todos os direitos reservados.

</footer>

<div id="pdfModal"
class="modal">

  <div id="pdfHeader">

    <button onclick="closePDF()">
      Fechar
    </button>

  </div>

  <iframe id="pdfViewer"></iframe>

</div>

<div id="cultoPlayer"
class="modal">

  <div id="cultoPlayerHeader">

    <button onclick="closeCultoPlayer()">
      Fechar
    </button>

    <span id="cultoCounter"></span>

  </div>

  <iframe id="cultoViewer"></iframe>

  <div id="cultoControls">

    <button onclick="previousCultoMusic()">
      Anterior
    </button>

    <button onclick="nextCultoMusic()">
      Próxima
    </button>

  </div>

</div>

<script src="app.js?v=10"></script>

</body>
</html>
