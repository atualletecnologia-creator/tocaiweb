<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tocai</title>
  <link rel="stylesheet" href="style.css?v=40">
</head>

<body>

<section id="welcomeScreen" class="welcome-screen">
  <div class="welcome-content">

    <div class="brand brand-white">
      <div class="brand-mark">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <i></i>
      </div>

      <div class="brand-name">
        TOCAI
      </div>
    </div>

    <p class="welcome-subtitle">
      Facilitando a vida do Instrumentista
    </p>

    <select id="welcomeInstrumentSelect">
      <option value="">Selecione seu instrumento</option>
    </select>

    <button onclick="saveInstrumentAndEnter()">
      Entrar
    </button>

  </div>
</section>

<section id="appScreen" class="app-screen hidden">

  <header class="app-header">

    <button class="menu-button" onclick="openMenu()">
      ☰
    </button>

    <div class="brand brand-burgundy small">
      <div class="brand-mark">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <i></i>
      </div>

      <div class="brand-name">
        TOCAI
      </div>
    </div>

    <div class="header-spacer"></div>

  </header>

  <main class="app-main">

    <div class="search-box">
      <input
        type="text"
        id="searchInput"
        placeholder="Buscar partitura..."
      >

      <button onclick="searchPDFs()">
        Buscar
      </button>
    </div>

    <div id="selectedInstrumentLabel"></div>

    <div id="results"></div>

  </main>

  <footer>
    © 2026 Atualle Tecnologia. Todos os direitos reservados.
  </footer>

</section>

<div id="sideMenuOverlay" class="side-menu-overlay" onclick="closeMenu()"></div>

<nav id="sideMenu" class="side-menu">

  <div class="menu-brand">
    <div class="brand brand-white small">
      <div class="brand-mark">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <i></i>
      </div>

      <div class="brand-name">
        TOCAI
      </div>
    </div>
  </div>

  <button onclick="showCultoPage()">
    Lista de Culto
  </button>

  <button onclick="showUploadPage()">
    Enviar partitura
  </button>

  <button onclick="changeInstrument()">
    Trocar instrumento
  </button>

  <button onclick="closeMenu()">
    Fechar menu
  </button>

</nav>

<section id="cultoPage" class="page-panel hidden">

  <div class="page-header">
    <button onclick="closePagePanels()">← Voltar</button>
    <h2>Lista de Culto</h2>
  </div>

  <button onclick="openCultoPlayer()">
    Abrir Lista
  </button>

  <button class="secondary" onclick="clearCultoList()">
    Limpar Lista
  </button>

  <div id="cultoList"></div>

</section>

<section id="uploadPage" class="page-panel hidden">

  <div class="page-header">
    <button onclick="closePagePanels()">← Voltar</button>
    <h2>Enviar partitura</h2>
  </div>

  <p class="muted">
    O PDF será enviado para o instrumento selecionado.
  </p>

  <input
    type="file"
    id="uploadFile"
    accept="application/pdf"
  >

  <button onclick="uploadPDF()">
    Enviar PDF
  </button>

  <p id="uploadStatus"></p>

</section>

<div id="pdfModal" class="modal" onclick="togglePDFControls()">

  <div id="pdfHeader" onclick="event.stopPropagation()">

    <button onclick="closePDF()">
      Fechar
    </button>

  </div>

  <iframe id="pdfViewer"></iframe>

</div>

<div id="cultoPlayer" class="modal" onclick="toggleCultoControls()">

  <div id="cultoPlayerHeader" onclick="event.stopPropagation()">

    <button onclick="closeCultoPlayer()">
      Fechar
    </button>

    <span id="cultoCounter"></span>

  </div>

  <iframe id="cultoViewer"></iframe>

  <div id="cultoControls" onclick="event.stopPropagation()">

    <button onclick="previousCultoMusic()">
      Anterior
    </button>

    <button onclick="nextCultoMusic()">
      Próxima
    </button>

  </div>

</div>

<script src="app.js?v=40"></script>

</body>
</html>
